<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYGGE HR · Quản lý ca làm</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/calam.css" />
</head>
<body>

<div class="mobile-overlay" onclick="closeMobileSidebar()"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <header class="header" id="header-root"></header>

    <main class="content">

      <!-- ── Stat strip ── -->
      <div class="stat-strip">
        <div class="stat-tile t-accent">
          <div class="st-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
            </svg>
          </div>
          <div>
            <div class="st-val" id="st-total">—</div>
            <div class="st-lbl">Tổng ca định nghĩa</div>
          </div>
        </div>
      </div>

      <!-- ── Toolbar ── -->
      <div class="toolbar">
        <button class="btn btn-primary" onclick="openAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Tạo ca mới
        </button>
      </div>

      <!-- ── Danh sách ca ── -->
      <div class="ca-list" id="ca-list"></div>

      <!-- ── Empty state ── -->
      <div class="ca-empty" id="ca-empty" style="display:none;">
        <div class="ca-empty-icon">📅</div>
        <p>Chưa có ca làm nào được tạo.</p>
        <button class="btn btn-primary" onclick="openAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Tạo ca đầu tiên
        </button>
      </div>

    </main>
  </div>
</div>


<!-- ══════════════════════════════════════════
     SIDE PANEL: Thêm / Sửa ca làm
══════════════════════════════════════════ -->
<div class="side-overlay" id="side-overlay" onclick="closeSidePanel('ca-panel')"></div>

<div class="side-panel" id="ca-panel">
  <div class="side-panel-header">
    <span class="side-panel-title" id="panel-title">Tạo ca mới</span>
    <button class="btn-icon" onclick="closeSidePanel('ca-panel')" title="Đóng">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="side-panel-body">

    <!-- Tên ca -->
    <div class="form-group">
      <label class="form-label">Tên ca <span style="color:var(--red)">*</span></label>
      <input id="f-tenca" class="form-control" placeholder="Vd: Ca sáng, Ca chiều…" />
      <div class="form-error" id="e-tenca"></div>
    </div>

    <!-- Giờ bắt đầu / kết thúc -->
    <div class="time-row">
      <div class="form-group">
        <label class="form-label">Giờ bắt đầu <span style="color:var(--red)">*</span></label>
        <input id="f-batdau" class="form-control" type="time" />
        <div class="form-error" id="e-batdau"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Giờ kết thúc <span style="color:var(--red)">*</span></label>
        <input id="f-ketthuc" class="form-control" type="time" />
        <div class="form-error" id="e-ketthuc"></div>
      </div>
    </div>

    <!-- Preview thời lượng -->
    <div class="preview-bar hidden" id="preview-bar">
      <span class="preview-icon">⏱️</span>
      <span id="preview-text"></span>
    </div>

  </div>

  <div class="side-panel-footer">
    <button class="btn btn-outline" onclick="closeSidePanel('ca-panel')">Hủy</button>
    <button class="btn btn-primary" id="btn-save-ca" onclick="saveCalam()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <path d="M17 21v-8H7v8M7 3v5h8"/>
      </svg>
      Lưu ca làm
    </button>
  </div>
</div>


<!-- ══════════════════════════════════════════
     CONFIRM MODAL (xóa)
══════════════════════════════════════════ -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-body" style="text-align:center; padding:32px 24px 20px;">
      <div class="confirm-icon" id="confirm-icon">🗑️</div>
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-text"  id="confirm-text"></div>
    </div>
    <div class="modal-footer" style="justify-content:center; gap:12px;">
      <button class="btn btn-outline" onclick="closeModal('confirm-modal')">Hủy</button>
      <button class="btn btn-danger"  onclick="confirmOk()">Xác nhận xóa</button>
    </div>
  </div>
</div>


<script src="/js/shared.js"></script>
<script src="/js/calam.js"></script>
<script>
  initLayout(['quanly']).then(user => {
    if (!user) return;
    initCaLam();
  });
</script>
</body>
</html>
