<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYGGE HR · Quản lý ca làm</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="/css/calm.css" />
</head>
<body>

<div class="mobile-overlay" onclick="closeMobileSidebar()"></div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar-root"></aside>

  <div class="main">
    <header class="header" id="header-root"></header>

    <main class="content">

      <!-- ── Stat strip ── -->
      <div class="stat-strip">
        <div class="stat-tile t-accent">
          <div class="st-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/>
            </svg>
          </div>
          <div>
            <div class="st-val" id="st-total">—</div>
            <div class="st-lbl">Tổng ca định nghĩa</div>
          </div>
        </div>
        <div class="stat-tile t-blue">
          <div class="st-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
            </svg>
          </div>
          <div>
            <div class="st-val" id="st-fulltime">—</div>
            <div class="st-lbl">Ca ngắn (Part-time)</div>
          </div>
        </div>
        <div class="stat-tile t-amber">
          <div class="st-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
              <circle cx="9" cy="7" r="4"/>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
          </div>
          <div>
            <div class="st-val" id="st-parttime">—</div>
            <div class="st-lbl">Ca dài (Full-time)</div>
          </div>
        </div>
      </div>

      <!-- ── Toolbar ── -->
      <div class="toolbar">
        <button class="btn btn-primary" onclick="openAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Tạo ca mới
        </button>
      </div>

      <!-- ── Danh sách ca ── -->
      <div class="ca-list" id="ca-list"></div>

      <!-- ── Empty state ── -->
      <div class="ca-empty" id="ca-empty" style="display:none;">
        <div class="ca-empty-icon">📅</div>
        <p>Chưa có ca làm nào được tạo.</p>
        <button class="btn btn-primary" onclick="openAdd()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          Tạo ca đầu tiên
        </button>
      </div>

    </main>
  </div>
</div>


<!-- ══════════════════════════════════════════
     SIDE PANEL: Thêm / Sửa ca làm
══════════════════════════════════════════ -->
<div class="side-overlay" id="side-overlay" onclick="closeSidePanel('ca-panel')"></div>

<div class="side-panel" id="ca-panel">
  <div class="side-panel-header">
    <span class="side-panel-title" id="panel-title">Tạo ca mới</span>
    <button class="btn-icon" onclick="closeSidePanel('ca-panel')" title="Đóng">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <div class="side-panel-body">

    <!-- Tên ca -->
    <div class="form-group">
      <label class="form-label">Tên ca <span style="color:var(--red)">*</span></label>
      <input id="f-tenca" class="form-control" placeholder="Vd: Ca sáng, Ca chiều…" />
      <div class="form-error" id="e-tenca"></div>
    </div>

    <!-- Giờ bắt đầu / kết thúc -->
    <div class="time-row">
      <div class="form-group">
        <label class="form-label">Giờ bắt đầu <span style="color:var(--red)">*</span></label>
        <input id="f-batdau" class="form-control" type="time" />
        <div class="form-error" id="e-batdau"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Giờ kết thúc <span style="color:var(--red)">*</span></label>
        <input id="f-ketthuc" class="form-control" type="time" />
        <div class="form-error" id="e-ketthuc"></div>
      </div>
    </div>

    <!-- Preview thời lượng -->
    <div class="preview-bar hidden" id="preview-bar">
      <span class="preview-icon">⏱️</span>
      <span id="preview-text"></span>
    </div>

    <!-- Loại nhân viên phù hợp -->
    <div class="form-group" style="margin-top:16px;">
      <label class="form-label">Phù hợp với loại nhân viên <span style="color:var(--red)">*</span></label>
      <div class="loai-group">
        <label class="loai-option selected" data-val="parttime">
          <input type="radio" name="loai" value="parttime" checked />
          <div class="lo-label">Part-time</div>
          <div class="lo-sub">Ca ngắn, linh hoạt</div>
        </label>
        <label class="loai-option" data-val="fulltime">
          <input type="radio" name="loai" value="fulltime" />
          <div class="lo-label">Full-time</div>
          <div class="lo-sub">Ca dài, cố định</div>
        </label>
        <label class="loai-option" data-val="both">
          <input type="radio" name="loai" value="both" />
          <div class="lo-label">Cả hai</div>
          <div class="lo-sub">Không giới hạn</div>
        </label>
      </div>
    </div>

    <!-- Ghi chú -->
    <div class="form-group">
      <label class="form-label">Ghi chú <span style="color:var(--ink-muted);font-weight:400">(không bắt buộc)</span></label>
      <textarea id="f-ghichu" class="form-control" rows="2"
                placeholder="Thêm mô tả hoặc lưu ý cho ca này…"
                style="resize:vertical;"></textarea>
    </div>

    <!-- Alert cảnh báo khi sửa -->
    <div class="alert alert-warning" id="edit-warning" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16" style="flex-shrink:0;margin-top:1px">
        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
        <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      <span>Thay đổi thời gian ca sẽ cập nhật vào <strong>lịch làm tuần sau</strong>. Lịch tuần hiện tại không bị ảnh hưởng.</span>
    </div>

  </div>

  <div class="side-panel-footer">
    <button class="btn btn-outline" onclick="closeSidePanel('ca-panel')">Hủy</button>
    <button class="btn btn-primary" onclick="saveCalm()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
        <path d="M17 21v-8H7v8M7 3v5h8"/>
      </svg>
      Lưu ca làm
    </button>
  </div>
</div>


<!-- ══════════════════════════════════════════
     CONFIRM MODAL (xóa)
══════════════════════════════════════════ -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-body" style="text-align:center; padding:32px 24px 20px;">
      <div class="confirm-icon" id="confirm-icon">🗑️</div>
      <div class="confirm-title" id="confirm-title"></div>
      <div class="confirm-text"  id="confirm-text"></div>
    </div>
    <div class="modal-footer" style="justify-content:center; gap:12px;">
      <button class="btn btn-outline" onclick="closeModal('confirm-modal')">Hủy</button>
      <button class="btn btn-danger"  onclick="confirmOk()">Xác nhận xóa</button>
    </div>
  </div>
</div>


<script src="/js/shared.js"></script>
<script src="/js/calm.js"></script>
<script>
  initLayout(['quanly']).then(user => {
    if (!user) return;
    initCaLam();

    /* Khi mở panel chỉnh sửa: hiện cảnh báo lịch tuần sau */
    const origOpenEdit = openEdit;
    window.openEdit = function(maca) {
      origOpenEdit(maca);
      document.getElementById('edit-warning').style.display = 'flex';
    };
    const origOpenAdd = openAdd;
    window.openAdd = function() {
      origOpenAdd();
      document.getElementById('edit-warning').style.display = 'none';
    };
  });
</script>
</body>
</html>
