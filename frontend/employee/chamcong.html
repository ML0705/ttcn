<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYGGE HR · Chấm công</title>
  <link rel="stylesheet" href="../css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
</head>
<body>

  <div class="mobile-overlay" onclick="toggleMobileSidebar()"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar-root"></aside>
    <div class="main">
      <header class="header" id="header-root"></header>
      <main class="content">

        <!-- THỐNG KÊ THÁNG -->
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-label">Số ngày làm tháng này</div>
            <div class="stat-value" id="stat-worked-days">--</div>
            <div class="stat-sub" id="stat-expected-days">/ -- ngày dự kiến</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Số giờ làm tháng này</div>
            <div class="stat-value" id="stat-total-hours">--</div>
            <div class="stat-sub">giờ</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Số lần đi muộn</div>
            <div class="stat-value" id="stat-late-count">--</div>
            <div class="stat-sub">lần trong tháng</div>
          </div>
        </div>

        <!-- CA LÀM HÔM NAY -->
        <div class="card">
          <div class="page-bar" style="margin-bottom: 18px;">
            <div class="page-bar-left">
              <h2 class="card-title" style="margin:0">Ca làm hôm nay</h2>
            </div>
            <div class="page-bar-right">
              <span class="badge badge-green" id="shift-status-badge">--</span>
            </div>
          </div>

          <div class="flex justify-between gap-16" style="flex-wrap: wrap; margin-bottom: 24px;">
            <div>
              <div class="stat-label">Tên ca</div>
              <div class="stat-value" id="shift-name" style="font-size: 16px;">--</div>
            </div>
            <div>
              <div class="stat-label">Giờ bắt đầu</div>
              <div class="stat-value" id="shift-start" style="font-size: 16px;">--:--</div>
            </div>
            <div>
              <div class="stat-label">Giờ kết thúc</div>
              <div class="stat-value" id="shift-end" style="font-size: 16px;">--:--</div>
            </div>
          </div>

          <!-- Thanh tiến trình -->
          <div class="flex items-center justify-between" style="margin-bottom: 24px; padding: 0 8px;">
            <div class="flex flex-col items-center gap-8">
              <div id="tl-dot-checkin" style="width:12px;height:12px;border-radius:50%;background:var(--border);border:2px solid var(--border-strong);"></div>
              <div class="text-sm fw-600" id="tl-checkin-time">--:--</div>
              <div class="text-muted text-sm">Check-in</div>
            </div>
            <div id="tl-line-left" style="flex:1;height:2px;background:var(--border);margin:0 8px;"></div>
            <div class="flex flex-col items-center gap-8">
              <div id="tl-dot-current" style="width:12px;height:12px;border-radius:50%;background:var(--border);border:2px solid var(--border-strong);"></div>
              <div class="text-sm fw-600" id="tl-current-label" style="color:var(--ink-muted);">--</div>
              <div class="text-muted text-sm" id="tl-current-sub"></div>
            </div>
            <div id="tl-line-right" style="flex:1;height:2px;background:var(--border);margin:0 8px;"></div>
            <div class="flex flex-col items-center gap-8">
              <div id="tl-dot-checkout" style="width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--border-strong);"></div>
              <div class="text-sm fw-600" id="tl-checkout-time">--:--</div>
              <div class="text-muted text-sm">Check-out</div>
            </div>
          </div>

          <!-- Chi tiết check-in / check-out -->
          <div class="form-row" style="margin-bottom: 20px;">
            <div class="stat-card">
              <div class="stat-label">Check-in</div>
              <div class="stat-value" id="ci-time-value" style="color:var(--accent);">--:--</div>
              <span class="badge badge-gray" id="ci-status-badge"></span>
              <div class="text-sm text-muted" id="ci-location" style="margin-top:6px;"></div>
            </div>
            <div class="stat-card">
              <div class="stat-label">Check-out</div>
              <div id="co-content">
                <div class="stat-value">--:--</div>
                <span class="badge badge-gray">Chưa check-out</span>
              </div>
            </div>
          </div>

          <button class="btn btn-primary" id="btn-shift-action"
            style="width:100%;justify-content:center;" onclick="openGpsModal()" disabled>
            --
          </button>
        </div>

      </main>
    </div>
  </div>

  <!-- Modal GPS -->
  <div class="modal-overlay" id="gps-modal">
    <div class="modal" style="width:420px;">
      <div class="modal-header">
        <div style="font-weight:700;">📍 Xác nhận vị trí <span id="gps-action-label"></span></div>
        <button class="btn-icon" onclick="closeGpsModal()">✕</button>
      </div>
      <div class="modal-body">
        <div id="gps-status" class="text-sm text-muted" style="margin-bottom:10px;">Đang lấy vị trí hiện tại...</div>
        <div id="gps-map" style="width:100%;height:240px;border-radius:var(--radius);background:var(--surface-2);overflow:hidden;"></div>
        <div id="gps-coords" class="text-sm text-muted" style="margin-top:10px;"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeGpsModal()">Hủy</button>
        <button class="btn btn-primary" id="gps-confirm-btn" onclick="confirmGpsAction()" disabled>Xác nhận</button>
      </div>
    </div>
  </div>

  <div class="side-overlay" id="side-overlay"></div>

  <script src="../js/shared.js"></script>
  <script>
    const API = 'http://localhost:3000/api';
    let shiftState  = { status: 'pending', caHomNay: null, chamCong: null };
    let pendingGpsCoords = null;
    let gpsMapInstance   = null;

    // ─── Format giờ từ chuỗi hoặc Date ───────────────
    // ─── Format giờ từ chuỗi hoặc Date (ĐÃ NÂNG CẤP BỌC THÉP) ───────────────
    // ─── Format giờ TỰ ĐỘNG NHẬN DIỆN MÚI GIỜ VN ───────────────
    function fmtTime(val) {
      if (!val) return '--:--';
      
      try {
        // Ném chuỗi của Database vào Date để trình duyệt tự dịch (Ví dụ: 04:31 UTC -> 11:31 VN)
        const d = new Date(val);
        if (!isNaN(d.getTime())) {
          return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
        }
      } catch (e) {}

      // Nếu DB trả về chuỗi giờ thuần túy (VD: "13:00:00") thì mới xài cắt chữ
      const strVal = String(val);
      if (strVal.includes('T')) return strVal.split('T')[1].substring(0, 5);
      if (strVal.includes(' ')) return strVal.split(' ')[1].substring(0, 5);
      if (strVal.includes(':')) return strVal.substring(0, 5);
      
      return '--:--';
    }
    // ─── Load dữ liệu từ API ─────────────────────────
    async function loadHomNay() {
      const token = localStorage.getItem('token');
      try {
        const res  = await fetch(`${API}/chamcong/homnay`, {
          headers: { Authorization: `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Lỗi tải dữ liệu');
        const data = await res.json();

        // Xác định trạng thái
        if (!data.caHomNay) {
          shiftState.status = 'no-shift'; // không có ca hôm nay
        } else if (!data.chamCong || !data.chamCong.checkin) {
          shiftState.status = 'pending';
        } else if (data.chamCong.checkin && !data.chamCong.checkout) {
          shiftState.status = 'in';
        } else {
          shiftState.status = 'done';
        }

        shiftState.caHomNay = data.caHomNay;
        shiftState.chamCong = data.chamCong;

        // Thống kê tháng
        const tk = data.thongKe;
        document.getElementById('stat-worked-days').textContent  = tk.soNgayLam;
        document.getElementById('stat-expected-days').textContent = `/ ${tk.soNgayDuKien} ngày dự kiến`;
        document.getElementById('stat-total-hours').textContent  = tk.tongGioLam;
        document.getElementById('stat-late-count').textContent   = tk.soLanDiMuon;

        renderShiftState();
      } catch (err) {
        console.error(err);
        showToast('Không thể tải dữ liệu chấm công', 'error');
      }
    }

    // ─── Render giao diện theo trạng thái ────────────
    function renderShiftState() {
      const { status, caHomNay, chamCong } = shiftState;
      const btn     = document.getElementById('btn-shift-action');
      const badge   = document.getElementById('shift-status-badge');

      // Nếu không có ca hôm nay
      if (status === 'no-shift') {
        document.getElementById('shift-name').textContent  = 'Không có ca';
        document.getElementById('shift-start').textContent = '--:--';
        document.getElementById('shift-end').textContent   = '--:--';
        badge.className   = 'badge badge-gray';
        badge.textContent = 'Không có ca hôm nay';
        btn.textContent   = 'Không có ca làm hôm nay';
        btn.disabled      = true;
        return;
      }

      // Thông tin ca
      document.getElementById('shift-name').textContent  = caHomNay.tenca;
      document.getElementById('shift-start').textContent = fmtTime(caHomNay.batdau);
      document.getElementById('shift-end').textContent   = fmtTime(caHomNay.ketthuc);
      document.getElementById('tl-checkout-time').textContent = fmtTime(caHomNay.ketthuc);

      const dotCI  = document.getElementById('tl-dot-checkin');
      const dotCur = document.getElementById('tl-dot-current');
      const dotCO  = document.getElementById('tl-dot-checkout');
      const lineL  = document.getElementById('tl-line-left');
      const lineR  = document.getElementById('tl-line-right');
      const curLbl = document.getElementById('tl-current-label');
      const curSub = document.getElementById('tl-current-sub');
      const ciTime = document.getElementById('ci-time-value');
      const ciBadge= document.getElementById('ci-status-badge');
      const coEl   = document.getElementById('co-content');

      if (status === 'pending') {
        badge.className = 'badge badge-gray';
        badge.textContent = 'Chưa check-in';
        dotCI.style.cssText  = 'width:12px;height:12px;border-radius:50%;background:var(--surface);border:2px solid var(--border-strong);';
        lineL.style.background = 'var(--border)';
        curLbl.textContent = 'Chưa bắt đầu';
        curLbl.style.color = 'var(--ink-muted)';
        curSub.textContent = '';
        ciTime.textContent = '--:--';
        ciBadge.className  = 'badge badge-gray';
        ciBadge.textContent= 'Chưa check-in';
        coEl.innerHTML = `<div class="stat-value">--:--</div><span class="badge badge-gray">Chưa check-out</span>`;
        btn.textContent = `Check-in ${caHomNay.tenca.toLowerCase()}`;
        btn.disabled    = false;
        btn.className   = 'btn btn-primary';
        document.getElementById('tl-checkin-time').textContent = '--:--';

      } else if (status === 'in') {
        const late = chamCong.trangthaicheckin === 1;
        badge.className = 'badge badge-green';
        badge.textContent = 'Đang trong ca';
        dotCI.style.cssText  = 'width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;';
        lineL.style.background = 'var(--accent)';
        curLbl.textContent = 'Đang làm';
        curLbl.style.color = 'var(--accent)';
        curSub.textContent = 'Hiện tại';
        const ciTimeStr = fmtTime(chamCong.checkin);
        ciTime.textContent = ciTimeStr;
        document.getElementById('tl-checkin-time').textContent = ciTimeStr;
        ciBadge.className   = late ? 'badge badge-amber' : 'badge badge-green';
        // Tính phút muộn từ dữ liệu thật
        if (late) {
          const bdDate = new Date(); const [h,m] = caHomNay.batdau.split(':').map(Number);
          bdDate.setHours(h,m,0,0);
          const ciDate = new Date(chamCong.checkin);
          const phut = Math.floor((ciDate - bdDate) / 60000);
          ciBadge.textContent = `⚠ Muộn ${phut} phút`;
        } else {
          ciBadge.textContent = 'Đúng giờ';
        }
        coEl.innerHTML = `<div class="stat-value">--:--</div><span class="badge badge-gray">Chưa check-out</span>`;
        btn.textContent = `Check-out ${caHomNay.tenca.toLowerCase()}`;
        btn.disabled    = false;
        btn.className   = 'btn btn-primary';

      } else { // done
        const late  = chamCong.trangthaicheckin  === 1;
        const early = chamCong.trangthaicheckout === 1;
        badge.className = 'badge badge-blue';
        badge.textContent = 'Đã hoàn thành';
        dotCI.style.cssText   = 'width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;';
        dotCO.style.cssText   = 'width:12px;height:12px;border-radius:50%;background:var(--accent);border:none;';
        dotCur.style.cssText  = 'width:12px;height:12px;border-radius:50%;background:var(--ink-muted);border:none;';
        lineL.style.background = 'var(--accent)';
        lineR.style.background = 'var(--accent)';
        curLbl.textContent = 'Hoàn thành';
        curLbl.style.color = 'var(--ink-muted)';
        curSub.textContent = '';
        const ciTimeStr = fmtTime(chamCong.checkin);
        const coTimeStr = fmtTime(chamCong.checkout);
        ciTime.textContent = ciTimeStr;
        document.getElementById('tl-checkin-time').textContent  = ciTimeStr;
        document.getElementById('tl-checkout-time').textContent = coTimeStr;
        ciBadge.className   = late  ? 'badge badge-amber' : 'badge badge-green';
        ciBadge.textContent = late  ? '⚠ Muộn' : 'Đúng giờ';
        coEl.innerHTML = `
          <div class="stat-value" style="color:var(--accent);">${coTimeStr}</div>
          <span class="badge ${early ? 'badge-amber' : 'badge-green'}">${early ? '⚠ Về sớm' : 'Đúng giờ'}</span>`;
        btn.textContent = 'Đã hoàn thành ca';
        btn.disabled    = true;
        btn.className   = 'btn btn-success';
      }
    }

    // ─── Gọi API check-in / check-out ────────────────
    async function handleShiftAction(coords) {
      const token    = localStorage.getItem('token');
      const endpoint = shiftState.status === 'pending' ? 'checkin' : 'checkout';

      try {
        const res = await fetch(`${API}/chamcong/${endpoint}`, {
          method:  'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization:  `Bearer ${token}`
          },
          body: JSON.stringify({
            latitude:  coords?.lat  || null,
            longitude: coords?.lng  || null
          })
        });
        const data = await res.json();

        if (!res.ok) {
          showToast(data.message || 'Có lỗi xảy ra', 'error');
          return;
        }

        showToast(data.message, 'success');
        // Reload lại dữ liệu mới nhất từ server
        await loadHomNay();

      } catch (err) {
        showToast('Không thể kết nối server', 'error');
      }
    }

    // ─── Modal GPS ────────────────────────────────────
    function openGpsModal() {
      if (shiftState.status === 'done' || shiftState.status === 'no-shift') return;
      document.getElementById('gps-action-label').textContent =
        shiftState.status === 'pending' ? 'Check-in' : 'Check-out';
      document.getElementById('gps-status').textContent = 'Đang lấy vị trí hiện tại...';
      document.getElementById('gps-coords').textContent = '';
      document.getElementById('gps-confirm-btn').disabled = true;
      pendingGpsCoords = null;
      openModal('gps-modal');

      if (!navigator.geolocation) {
        document.getElementById('gps-status').textContent = '⚠ Thiết bị không hỗ trợ GPS.';
        return;
      }

      navigator.geolocation.getCurrentPosition(
        pos => {
          const { latitude, longitude, accuracy } = pos.coords;
          pendingGpsCoords = { lat: latitude, lng: longitude };
          document.getElementById('gps-status').textContent = '✅ Đã xác định được vị trí';
          document.getElementById('gps-coords').textContent =
            `Toạ độ: ${latitude.toFixed(5)}, ${longitude.toFixed(5)} (±${Math.round(accuracy)}m)`;
          renderGpsMap(latitude, longitude);
          document.getElementById('gps-confirm-btn').disabled = false;
        },
        err => {
          document.getElementById('gps-status').textContent =
            '⚠ Không thể lấy vị trí: ' + err.message;
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    }

    function renderGpsMap(lat, lng) {
      const mapEl = document.getElementById('gps-map');
      if (gpsMapInstance) { gpsMapInstance.remove(); gpsMapInstance = null; }
      mapEl.innerHTML = '';
      gpsMapInstance = L.map(mapEl, { zoomControl: false, attributionControl: false }).setView([lat, lng], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(gpsMapInstance);
      L.marker([lat, lng]).addTo(gpsMapInstance);
      setTimeout(() => gpsMapInstance && gpsMapInstance.invalidateSize(), 150);
    }

    function closeGpsModal() { closeModal('gps-modal'); }

    function confirmGpsAction() {
      if (!pendingGpsCoords) return;
      const coords = pendingGpsCoords;
      closeGpsModal();
      handleShiftAction(coords);
    }

    // ─── Khởi động ────────────────────────────────────
    initLayout(['nhanvien']).then(user => {
      if (!user) return;
      loadHomNay();
    });
  </script>
</body>
</html>
