<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HYGGE HR · Đăng ký ca làm</title>
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>

  <div class="mobile-overlay" onclick="toggleMobileSidebar()"></div>

  <div class="app-shell">

    <aside class="sidebar" id="sidebar-root"></aside>

    <div class="main">

      <header class="header" id="header-root"></header>

      <main class="content">

        <div class="tabs">
          <button class="tab-btn active" id="tab-btn-view"    onclick="switchTab('view')">Xem</button>
          <button class="tab-btn"        id="tab-btn-edit"    onclick="switchTab('edit')">Chỉnh sửa</button>
          <button class="tab-btn"        id="tab-btn-confirm" onclick="switchTab('confirm')" disabled>Xác nhận</button>
        </div>

        <div class="alert alert-info" id="reg-banner-open">
          📌 Đang mở đăng ký cho tuần <strong id="banner-week-range">--</strong>.
          Hạn đăng ký: <strong id="banner-deadline">--</strong>
        </div>
        <div class="alert alert-warning" id="reg-banner-expired" style="display: none;">
          ⏰ Đã hết hạn đăng ký ca làm cho tuần này. Bạn chỉ có thể xem lịch đã đăng ký.
        </div>

        <div id="tab-view">
          <div class="page-bar">
            <div class="page-bar-left">
              <button class="btn-icon" onclick="changeWeek(-1)">‹</button>
              <span class="fw-600" id="view-week-label">--</span>
              <button class="btn-icon" onclick="changeWeek(1)">›</button>
            </div>
            <div class="page-bar-right">
              <span class="text-sm text-muted">
                Đã đăng ký: <strong id="view-reg-count">0 ca</strong>
              </span>
            </div>
          </div>

          <div class="card">
            <div class="week-grid-wrap">
              <table class="week-grid" id="view-grid"></table>
            </div>
            <div class="text-sm text-muted" style="margin-top: 8px;">
              * Bấm <strong>Chỉnh sửa</strong> để đăng ký hoặc thay đổi ca làm cho tuần này.
            </div>
          </div>
        </div>

        <div id="tab-edit" style="display: none;">
          <div class="page-bar">
            <div class="page-bar-left">
              <h2 class="card-title" style="margin: 0;">Chọn ca làm muốn đăng ký</h2>
            </div>
            <div class="page-bar-right">
              <span class="text-sm text-muted" id="edit-week-label">--</span>
            </div>
          </div>

          <div class="card">
            <div class="week-grid-wrap">
              <table class="week-grid" id="edit-grid"></table>
            </div>
          </div>

          <div class="flex justify-between" style="margin-top: 14px; flex-wrap: wrap; gap: 10px;">
            <button class="btn btn-outline" onclick="resetEdit()">↺ Đặt lại</button>
            <div class="flex gap-8" style="flex-wrap: wrap;">
              <button class="btn btn-outline" onclick="goConfirm()">👁 Kiểm tra lịch đã chọn</button>
              <button class="btn btn-primary" onclick="confirmSubmit()">✔ Xác nhận gửi đăng ký</button>
            </div>
          </div>
        </div>

        <div id="tab-confirm" style="display: none;">
          <div class="page-bar">
            <div class="page-bar-left">
              <h2 class="card-title" style="margin: 0;">Kiểm tra lại lịch đã chọn</h2>
            </div>
          </div>

          <div class="card">
            <table class="confirm-table" id="confirm-table"></table>
            <div class="text-sm text-muted" id="confirm-empty" style="display: none; text-align: center; padding: 20px;">
              Chưa chọn ca làm nào.
            </div>
          </div>

          <div class="flex justify-between" style="margin-top: 14px;">
            <button class="btn btn-outline" onclick="switchTab('edit')">Quay lại</button>
            <button class="btn btn-primary" onclick="confirmSubmit()">✔ Xác nhận gửi đăng ký</button>
          </div>
        </div>

      </main>
    </div>
  </div>

  <div class="modal-overlay" id="confirm-modal">
    <div class="modal" style="width: 360px;">
      <div class="modal-body" style="text-align: center; padding: 28px 24px;">
        <div class="confirm-icon">⚠️</div>
        <div class="confirm-title" id="confirm-title">Xác nhận</div>
        <div class="confirm-text" id="confirm-text"></div>
        <div class="flex gap-8" style="justify-content: center; margin-top: 20px;">
          <button class="btn btn-outline" onclick="closeModal('confirm-modal')">Hủy</button>
          <button class="btn btn-primary" onclick="confirmOk()">Xác nhận</button>
        </div>
      </div>
    </div>
  </div>

  <div class="side-overlay" id="side-overlay"></div>

 <script src="../js/shared.js"></script>
<script>
/* ============================================================
   dangky.js — Đăng ký ca làm (nhân viên)
   Logic:
   - Xem được tất cả các tuần
   - Chỉ được ĐĂNG KÝ cho tuần tới, trước thứ 7 tuần hiện tại
============================================================ */

// ── State ──
let allShifts        = [];
let lichTuan         = [];
let editSelection    = {};
let registeredSet    = {};
let currentWeekStart = null;

const DAYS_VN_LABEL = ['T2','T3','T4','T5','T6','T7','CN'];

// ── Helpers tuần ──

// FIX TIMEZONE: Hàm mới lấy chuỗi YYYY-MM-DD theo giờ Local của VN
function ymdLocal(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getMondayOf(d) {
  const date = new Date(d);
  const day  = date.getDay();
  date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
  date.setHours(0, 0, 0, 0);
  return date;
}

function addDays(d, n) {
  const date = new Date(d);
  date.setDate(date.getDate() + n);
  return date;
}

function getNextWeekMonday() {
  const today  = new Date();
  const thu    = today.getDay();
  const soNgay = thu === 0 ? 1 : 8 - thu;
  const d      = new Date(today);
  d.setDate(today.getDate() + soNgay);
  d.setHours(0, 0, 0, 0);
  return d;
}

function isNextWeek(weekStart) {
  return weekStart.toDateString() === getNextWeekMonday().toDateString();
}

// Còn hạn đăng ký = hôm nay từ T2 đến T6 (chưa T7, CN)
function conHanDangKy() {
  const thu = new Date().getDay();
  return thu >= 1 && thu <= 5;
}

// Tuần đang xem có thể chỉnh sửa không?
function coTheChinhSua() {
  return isNextWeek(currentWeekStart) && conHanDangKy();
}

// ── Init ──
initLayout(['nhanvien']).then(async user => {
  if (!user) return;

  currentWeekStart = getNextWeekMonday();
  allShifts = await apiFetch('/lichlam/cacalam').catch(() => []);

  await loadWeek();
  renderBanner();
  renderViewGrid();
  updateTabButtons();
  switchTab('view');
});

/* ============================================================
   LOAD DỮ LIỆU TUẦN ĐANG XEM
============================================================ */
async function loadWeek() {
  try {
    // Sửa lỗi timezone ở đây
    const startStr = ymdLocal(currentWeekStart); 
    lichTuan = await apiFetch(`/lichlam/tuan?start=${startStr}`);

    registeredSet = {};
    lichTuan.forEach(item => {
      if (item.daDangKy) registeredSet[item.malichlam] = true;
    });
  } catch (err) {
    lichTuan      = [];
    registeredSet = {};
    showToast('Không tải được dữ liệu lịch làm', 'error');
  }
}

/* ============================================================
   ĐỔI TUẦN
============================================================ */
async function changeWeek(delta) {
  currentWeekStart = addDays(currentWeekStart, delta * 7);
  await loadWeek();
  renderBanner();
  renderViewGrid();
  updateTabButtons();

  // Nếu đang ở tab edit/confirm mà chuyển tuần không hợp lệ → về tab view
  if (!coTheChinhSua()) {
    ['edit','confirm'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = 'none';
      document.getElementById(`tab-btn-${t}`).classList.remove('active');
    });
    document.getElementById('tab-view').style.display = 'block';
    document.getElementById('tab-btn-view').classList.add('active');
  }
}

/* ============================================================
   CẬP NHẬT TRẠNG THÁI NÚT TAB
============================================================ */
function updateTabButtons() {
  const coThe = coTheChinhSua();

  const btnEdit    = document.getElementById('tab-btn-edit');
  const btnConfirm = document.getElementById('tab-btn-confirm');

  btnEdit.disabled    = !coThe;
  btnConfirm.disabled = !coThe;

  btnEdit.title = coThe ? '' : 'Chỉ được chỉnh sửa lịch tuần tới, trước thứ 7';
  btnConfirm.title = coThe ? '' : 'Chỉ được đăng ký lịch tuần tới, trước thứ 7';
}

/* ============================================================
   BANNER
============================================================ */
function renderBanner() {
  const endOfWeek = addDays(currentWeekStart, 6);

  document.getElementById('banner-week-range').textContent =
    `${fmtDate(currentWeekStart)} – ${fmtDate(endOfWeek)}/${endOfWeek.getFullYear()}`;

  // Deadline = thứ 6 tuần trước tuần đăng ký (T2 - 3 ngày)
  const deadline = addDays(currentWeekStart, -3);
  document.getElementById('banner-deadline').textContent =
    `Thứ 6, ${fmtDate(deadline)}, 23:59`;

  const nextWeek = isNextWeek(currentWeekStart);
  const conHan   = conHanDangKy();

  // Xác định mốc Thứ 2 của tuần hiện tại để so sánh
  const today = new Date();
  const currentMonday = getMondayOf(new Date(today.getFullYear(), today.getMonth(), today.getDate()));

  if (nextWeek && conHan) {
    // 1. Đang xem Tuần tới + Còn hạn (T2 - T6)
    document.getElementById('reg-banner-open').style.display    = 'block';
    document.getElementById('reg-banner-expired').style.display = 'none';
  } else if (nextWeek && !conHan) {
    // 2. Đang xem Tuần tới + Hết hạn (Đã sang T7, CN)
    document.getElementById('reg-banner-open').style.display    = 'none';
    document.getElementById('reg-banner-expired').style.display = 'block';
  } else if (currentWeekStart <= currentMonday) {
    // 3. Đang xem Tuần hiện tại hoặc Quá khứ -> Chắc chắn đã hết hạn đăng ký
    document.getElementById('reg-banner-open').style.display    = 'none';
    document.getElementById('reg-banner-expired').style.display = 'block';
  } else {
    // 4. Các tuần xa tít tắp trong tương lai (sau tuần tới) -> Tạm thời giấu banner
    document.getElementById('reg-banner-open').style.display    = 'none';
    document.getElementById('reg-banner-expired').style.display = 'none';
  }
}

/* ============================================================
   HELPERS
============================================================ */
function buildLichMap() {
  const map = {};
  lichTuan.forEach(item => {
    const ngay = item.ngay.slice(0, 10);
    map[`${ngay}_${item.maca}`] = item.malichlam;
  });
  return map;
}

function getDatesOfWeek() {
  return Array.from({ length: 7 }, (_, i) => addDays(currentWeekStart, i));
}

function isToday(d) {
  const now = new Date();
  return d.getDate()     === now.getDate() &&
         d.getMonth()    === now.getMonth() &&
         d.getFullYear() === now.getFullYear();
}

function buildGridHeader(dates) {
  let html = '<thead><tr><th style="text-align:left;min-width:120px;">Ca làm</th>';
  dates.forEach((d, i) => {
    const style = isToday(d)
      ? ' style="background:var(--accent-light);color:var(--accent);"' : '';
    html += `<th${style}>${DAYS_VN_LABEL[i]}<br>
      <span style="font-size:10px;font-weight:400;">${fmtDate(d)}</span></th>`;
  });
  return html + '</tr></thead>';
}

function fmtTime(val) {
  if (!val) return '';
  const s = val.toString();
  return s.includes('T') ? s.slice(11, 16) : s.slice(0, 5);
}

function getWeekLabel() {
  const end = addDays(currentWeekStart, 6);
  return `${fmtDate(currentWeekStart)} – ${fmtDate(end)}/${end.getFullYear()}`;
}

/* ============================================================
   TAB XEM
============================================================ */
function renderViewGrid() {
  const dates   = getDatesOfWeek();
  const lichMap = buildLichMap();

  document.getElementById('view-week-label').textContent = getWeekLabel();

  if (!lichTuan.length) {
    document.getElementById('view-grid').innerHTML =
      `<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--ink-muted)">
        Chưa có lịch làm cho tuần này
      </td></tr>`;
    document.getElementById('view-reg-count').textContent = '0 ca';
    return;
  }

  let html = buildGridHeader(dates) + '<tbody>';
  allShifts.forEach(shift => {
    html += `<tr><td class="wg-shift-label">${shift.tenca}<br>
      <span style="font-size:10px;font-weight:400;color:var(--ink-muted);">
        ${fmtTime(shift.batdau)} – ${fmtTime(shift.ketthuc)}
      </span></td>`;

    dates.forEach(d => {
      // Sửa lỗi timezone ở đây
      const key       = `${ymdLocal(d)}_${shift.maca}`;
      const malichlam = lichMap[key];

      if (!malichlam) {
        html += `<td><div class="wg-cell"><span class="text-sm text-muted">—</span></div></td>`;
      } else if (registeredSet[malichlam]) {
        html += `<td><div class="wg-cell"><span class="badge badge-green">✓ Đã đăng ký</span></div></td>`;
      } else {
        html += `<td><div class="wg-cell"><span class="badge badge-gray">Chưa đăng ký</span></div></td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody>';
  document.getElementById('view-grid').innerHTML = html;
  document.getElementById('view-reg-count').textContent =
    `${Object.keys(registeredSet).length} ca`;
}

/* ============================================================
   TAB CHỈNH SỬA
============================================================ */
function renderEditGrid() {
  const dates   = getDatesOfWeek();
  const lichMap = buildLichMap();

  let html = buildGridHeader(dates) + '<tbody>';
  allShifts.forEach(shift => {
    html += `<tr><td class="wg-shift-label">${shift.tenca}<br>
      <span style="font-size:10px;font-weight:400;color:var(--ink-muted);">
        ${fmtTime(shift.batdau)} – ${fmtTime(shift.ketthuc)}
      </span></td>`;

    dates.forEach(d => {
      // Sửa lỗi timezone ở đây
      const key       = `${ymdLocal(d)}_${shift.maca}`;
      const malichlam = lichMap[key];

      if (!malichlam) {
        html += `<td><div class="wg-cell"><span class="text-sm text-muted">—</span></div></td>`;
      } else {
        const checked = !!editSelection[malichlam];
        html += `<td>
          <div class="wg-cell interactive ${checked ? 'checked' : ''}"
               onclick="toggleCell('${malichlam}')">
            ${checked
              ? '<span class="badge badge-green">✓ Đã chọn</span>'
              : '<span class="text-sm" style="color:var(--ink-muted)">+ Đăng ký</span>'}
          </div></td>`;
      }
    });
    html += '</tr>';
  });

  html += '</tbody>';
  document.getElementById('edit-grid').innerHTML = html;
  document.getElementById('edit-week-label').textContent = getWeekLabel();
}

function toggleCell(malichlam) {
  if (editSelection[malichlam]) delete editSelection[malichlam];
  else editSelection[malichlam] = true;
  renderEditGrid();
}

function resetEdit() {
  editSelection = { ...registeredSet };
  renderEditGrid();
  showToast('Đã đặt lại theo lịch đã đăng ký', 'info');
}

/* ============================================================
   TAB XÁC NHẬN
============================================================ */
function goConfirm() {
  if (!Object.keys(editSelection).length) {
    showToast('Vui lòng chọn ít nhất một ca!', 'error');
    return;
  }
  switchTab('confirm');
}

function renderConfirmTable() {
  const keys  = Object.keys(editSelection);
  const table = document.getElementById('confirm-table');
  const empty = document.getElementById('confirm-empty');

  if (!keys.length) {
    table.innerHTML     = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  const rows = keys.map(ml => {
    const item  = lichTuan.find(l => l.malichlam === ml);
    const shift = allShifts.find(s => s.maca === item?.maca);
    return { item, shift };
  }).filter(r => r.item && r.shift)
    .sort((a, b) => new Date(a.item.ngay) - new Date(b.item.ngay));

  let html = '<thead><tr><th>Ngày</th><th>Thứ</th><th>Ca làm</th><th>Giờ</th></tr></thead><tbody>';
  rows.forEach(r => {
    const d   = new Date(r.item.ngay);
    const thu = DAYS_VN_LABEL[d.getDay() === 0 ? 6 : d.getDay() - 1];
    html += `<tr>
      <td>${fmtDate(d)}/${d.getFullYear()}</td>
      <td>${thu}</td>
      <td>${r.shift.tenca}</td>
      <td>${fmtTime(r.shift.batdau)} – ${fmtTime(r.shift.ketthuc)}</td>
    </tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;
}

/* ============================================================
   GỬI ĐĂNG KÝ
============================================================ */
async function confirmSubmit() {
  const keys = Object.keys(editSelection);
  if (!keys.length) {
    showToast('Vui lòng chọn ít nhất một ca!', 'error');
    return;
  }

  showConfirm(
    'Xác nhận gửi đăng ký',
    `Đăng ký ${keys.length} ca làm cho tuần ${getWeekLabel()}?`,
    async () => {
      try {
        await apiFetch('/lichlam/dangky', 'POST', { danhSachMaLich: keys });
        registeredSet = { ...editSelection };
        renderViewGrid();
        switchTab('view');
        showToast('Gửi đăng ký thành công!', 'success');
      } catch (err) {
        showToast(err.message || 'Gửi đăng ký thất bại', 'error');
      }
    }
  );
}

/* ============================================================
   SWITCH TAB — chặn nếu không hợp lệ
============================================================ */
function switchTab(tab) {
  // Chặn vào tab edit/confirm nếu không đủ điều kiện
  if ((tab === 'edit' || tab === 'confirm') && !coTheChinhSua()) {
    if (!isNextWeek(currentWeekStart)) {
      showToast('Chỉ được đăng ký ca làm cho tuần tới', 'error');
    } else {
      showToast('Đã hết hạn đăng ký (chỉ đăng ký từ T2 đến T6)', 'error');
    }
    return; // không chuyển tab
  }

  ['view','edit','confirm'].forEach(t => {
    document.getElementById(`tab-${t}`).style.display    = t === tab ? 'block' : 'none';
    document.getElementById(`tab-btn-${t}`).classList.toggle('active', t === tab);
  });

  if (tab === 'edit') {
    editSelection = { ...registeredSet };
    renderEditGrid();
    document.getElementById('tab-btn-confirm').disabled = false;
  }
  if (tab === 'confirm') renderConfirmTable();
}
</script>
</body>
</html>
